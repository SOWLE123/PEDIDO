<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PCM Control</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #f8f9fa; font-size: 14px; }
    .oculto { display: none; }
    .card { border-radius: 12px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 10px; }
    .badge-status { padding: 8px; border-radius: 8px; font-size: 10px; font-weight: bold; color: white; display: block; text-align: center; text-transform: uppercase; }
    .bg-produccion { background-color: #0d6efd; } .bg-terminado { background-color: #6610f2; }
    .bg-facturado { background-color: #fd7e14; } .bg-pagado { background-color: #198754; }
    .bg-enviado { background-color: #6c757d; } .bg-unknown { background-color: #212529; }
    @media (max-width: 768px) {
      .table thead { display: none; }
      .table tr { display: block; background: white; margin-bottom: 10px; padding: 12px; border-radius: 10px; border: 1px solid #eee; }
      .table td { display: block; text-align: right; position: relative; padding: 8px 0; border: none; }
      .table td::before { content: attr(data-label); position: absolute; left: 0; font-weight: bold; color: #888; font-size: 11px; }
    }
  </style>
</head>
<body class="container py-3">

  <div id="loginSection" class="mt-5 mx-auto" style="max-width: 350px;">
    <div class="card p-4">
      <h4 class="text-center mb-4 fw-bold">PCM Logística</h4>
      <form onsubmit="event.preventDefault(); intentarLogin();">
        <input type="text" id="user" name="username" class="form-control mb-2" placeholder="Usuario" autocomplete="username" required>
        <input type="password" id="pass" name="password" class="form-control mb-3" placeholder="Contraseña" autocomplete="current-password" required>
        <button type="submit" id="btnLogin" class="btn btn-primary w-100 fw-bold">ENTRAR</button>
      </form>
    </div>
  </div>

  <div id="mainSection" class="oculto">
    <div class="d-flex justify-content-between align-items-center mb-3 bg-white p-2 rounded shadow-sm">
      <div style="font-size: 12px;"><span id="nombreUser" class="fw-bold text-dark"></span> | <span id="deptoUser" class="text-primary fw-bold"></span></div>
      <button class="btn btn-outline-danger btn-sm" onclick="location.reload()">Salir</button>
    </div>

    <div class="card p-3">
      <div class="row g-2">
        <div class="col-6"><label class="small fw-bold">Folio</label><input type="text" id="folio" class="form-control"></div>
        <div class="col-6"><label class="small fw-bold">ID Cliente</label><input type="text" id="numCli" class="form-control"></div>
        <div class="col-12"><label class="small fw-bold">Cliente</label><input type="text" id="nombreCli" class="form-control" list="listaClientes"></div>
        <div class="col-6"><label class="small fw-bold">% Pago</label><input type="number" id="porcentaje" class="form-control"></div>
        <div class="col-6"><label class="small fw-bold">Estatus</label>
          <select id="estatusProceso" class="form-select">
            <option value="LIBERADO PARA PRODUCCIÓN">1. LIBERACIÓN (Crédito)</option>
            <option value="PRODUCTO TERMINADO">2. TERMINADO (Logística)</option>
            <option value="FACTURADO">3. FACTURADO (Facturación)</option>
            <option value="PAGADO COMPLETO">4. PAGADO COMPLETO (Crédito)</option>
            <option value="ENVIADO">5. ENVIADO (Logística)</option>
          </select>
        </div>
        <div class="col-12 mt-2"><button class="btn btn-dark w-100 fw-bold py-2" id="btnEjecutar" onclick="guardar()">EJECUTAR ACCIÓN</button></div>
      </div>
    </div>

    <div class="row g-2 mb-3">
      <div class="col-7"><input type="text" id="buscador" class="form-control" placeholder="🔍 Buscar..." onkeyup="filtrar()"></div>
      <div class="col-2"><button class="btn btn-primary w-100 fw-bold" onclick="cargarDatos()" id="btnAct">↻</button></div>
      <div class="col-3"><button class="btn btn-secondary w-100 fw-bold" id="btnLimpiar" onclick="limpiarEnviados()" disabled>🧹</button></div>
    </div>

    <table class="table align-middle"><tbody id="tablaCuerpo"></tbody></table>
  </div>

  <datalist id="listaClientes"></datalist>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwwRqeWPVw4lZRcLZ-Roiq3wdmLKHcYbyeS08lNLevFcStLMoyiiCRVaHOANhmqxCMdXA/exec"; 
    let USUARIO_ACTUAL = null;
    let BASE_CLIENTES = [];

    async function intentarLogin() {
      const u = document.getElementById('user').value;
      const p = document.getElementById('pass').value;
      const btn = document.getElementById('btnLogin');
      btn.innerText = "..."; btn.disabled = true;
      try {
        const r = await fetch(WEB_APP_URL);
        const d = await r.json();
        const found = d.usuarios.find(x => x[0].toString().toLowerCase() === u.toLowerCase() && x[1].toString() === p);
        if(found) {
          USUARIO_ACTUAL = { nombre: found[2], depto: found[3] };
          document.getElementById('loginSection').classList.add('oculto');
          document.getElementById('mainSection').classList.remove('oculto');
          document.getElementById('nombreUser').innerText = USUARIO_ACTUAL.nombre;
          document.getElementById('deptoUser').innerText = USUARIO_ACTUAL.depto;
          
          if(found[3] === "Admin") {
            document.getElementById('btnLimpiar').disabled = false;
            document.getElementById('btnLimpiar').classList.replace('btn-secondary', 'btn-danger');
          }
          actualizarInterfaz(d);
        } else alert("Datos incorrectos");
      } catch(e) { alert("Error de conexión"); }
      btn.innerText = "ENTRAR"; btn.disabled = false;
    }

    function actualizarInterfaz(d) {
      BASE_CLIENTES = d.clientes;
      let dl = ""; d.clientes.forEach(c => dl += `<option value="${c[0]}">`);
      document.getElementById('listaClientes').innerHTML = dl;
      let h = "";
      [...d.pedidos].reverse().forEach(p => {
        let st = p[7] ? p[7].toUpperCase().trim() : "";
        let cl = "bg-unknown";
        if (st.includes("LIBERADO")) cl = "bg-produccion";
        else if (st.includes("TERMINADO")) cl = "bg-terminado";
        else if (st.includes("FACTURADO")) cl = "bg-facturado";
        else if (st.includes("PAGADO")) cl = "bg-pagado";
        else if (st.includes("ENVIADO")) cl = "bg-enviado";
        h += `<tr onclick="seleccionar('${p[0]}','${p[2]}','${p[1]}','${p[5]}','${p[7]}')">
          <td data-label="Folio"><strong>${p[0]}</strong></td>
          <td data-label="Cliente">${p[2]} <small>(${p[1]})</small></td>
          <td data-label="Pago" class="text-primary fw-bold">${p[5]}</td>
          <td data-label="Estatus"><span class="badge-status ${cl}">${p[7]}</span></td>
        </tr>`;
      });
      document.getElementById('tablaCuerpo').innerHTML = h;
    }

    async function cargarDatos() {
      const r = await fetch(WEB_APP_URL);
      const d = await r.json();
      actualizarInterfaz(d);
    }

    async function limpiarEnviados() {
      if(!confirm("¿Ocultar todos los pedidos ENVIADOS?")) return;
      const btn = document.getElementById('btnLimpiar');
      btn.disabled = true;
      try {
        const r = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'limpiarTabla' }) });
        const res = await r.json();
        alert(res.message);
        cargarDatos();
      } catch(e) { alert("Error"); }
      btn.disabled = false;
    }

    async function guardar() {
      const btn = document.getElementById('btnEjecutar');
      const body = { action: 'gestionarPedido', depto: USUARIO_ACTUAL.depto, nombreUsuario: USUARIO_ACTUAL.nombre, datos: {
        folio: document.getElementById('folio').value, nombre: document.getElementById('nombreCli').value,
        numCliente: document.getElementById('numCli').value, porcentajePagado: document.getElementById('porcentaje').value,
        nuevoEstatus: document.getElementById('estatusProceso').value
      }};
      btn.disabled = true; btn.innerText = "...";
      try {
        const r = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(body) });
        const res = await r.json();
        if(res.result === "success") { alert(res.message); cargarDatos(); } else alert(res.message);
      } catch(e) { alert("Error"); }
      btn.disabled = false; btn.innerText = "EJECUTAR ACCIÓN";
    }

    function seleccionar(f, n, i, p, e) {
      document.getElementById('folio').value = f; document.getElementById('nombreCli').value = n;
      document.getElementById('numCli').value = i; document.getElementById('porcentaje').value = p.replace('%','');
      document.getElementById('estatusProceso').value = e; window.scrollTo({top: 0, behavior: 'smooth'});
    }

    document.getElementById('nombreCli').addEventListener('input', (e) => {
      const cli = BASE_CLIENTES.find(c => c[0].toString().toUpperCase() === e.target.value.toUpperCase());
      if (cli) document.getElementById('numCli').value = cli[1];
    });

    function filtrar() {
      let f = document.getElementById("buscador").value.toUpperCase();
      let r = document.getElementById("tablaCuerpo").getElementsByTagName("tr");
      for (let i of r) i.style.display = i.innerText.toUpperCase().includes(f) ? "" : "none";
    }
  </script>
</body>
</html>
